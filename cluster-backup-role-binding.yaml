apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: cnpg-pod-secret-reader
  namespace: db
rules:
- apiGroups: [""]
  resources: ["secrets"]
  resourceNames: ["aws-creds"]
  verbs: ["get", "watch", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cnpg-pod-secret-reader-binding
  namespace: db
subjects:
- kind: ServiceAccount
  name: cluster-with-metrics
  namespace: db
roleRef:
  kind: Role
  name: cnpg-pod-secret-reader
  apiGroup: rbac.authorization.k8s.io

